# Kamome.xcodeproj is generated from this file via `xcodegen generate`.
# NEVER hand-edit the .xcodeproj (spec §11.1); it is gitignored.
name: Kamome
options:
  developmentLanguage: zh-Hant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  bundleIdPrefix: com.chiu

packages:
  KamomeCore:
    path: .
  # Recap base-map substrate (spec §4.5 step 2; ADR 2026-07-19). MapLibre is
  # confined to App/Services/MapLibreSnapshotProvider.swift — the only file that
  # imports it (CI grep gate). Pinned exactly: golden-frame CI must be
  # reproducible, and a floating map SDK is not.
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    exactVersion: 6.27.0

targets:
  Kamome:
    type: application
    platform: iOS
    sources:
      - App
      - UI
      - path: Config/TrackingConfig.json
        buildPhase: resources
      # Recap theme style JSON (§4.5 step 2 substrate). functional-base is the
      # §2 substrate; modern-minimal is the §3 DRAFT (not signed off — MapKit
      # stays the shipping base map until Chiu's design review clears it).
      - path: Config/RecapThemes/functional-base.json
        buildPhase: resources
      - path: Config/RecapThemes/modern-minimal.json
        buildPhase: resources
    dependencies:
      - package: KamomeCore
        product: KamomePersistence
      - package: KamomeCore
        product: KamomeConfig
      - package: KamomeCore
        product: KamomeTrackingEngine
      - package: KamomeCore
        product: KamomeTripComposer
      - package: KamomeCore
        product: KamomeExportEngine
      - package: KamomeCore
        product: KamomeRouteMatching
      - package: KamomeCore
        product: KamomeImportKit
      - package: MapLibre
        product: MapLibre
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Kamome
        CFBundleDevelopmentRegion: zh-Hant
        UILaunchScreen: {}
        # Purpose strings are localized in App/Resources/InfoPlist.xcstrings;
        # tracking only ever runs during an explicit trip (§6).
        NSLocationWhenInUseUsageDescription: Kamome records your route only during an active trip you started.
        NSLocationAlwaysAndWhenInUseUsageDescription: Always access lets Kamome keep recording an active trip in the background. Tracking stops the moment you end the trip.
        NSMotionUsageDescription: Motion data tells driving from walking so Kamome can save battery while recording.
        NSPhotoLibraryUsageDescription: Kamome reads photos taken during your trips to place them on your route. Selected-photos access works too. Photos are never copied or uploaded.
        UIBackgroundModes: [location]
    settings:
      base:
        # Placeholder until the trademark check clears (spec §11.1).
        PRODUCT_BUNDLE_IDENTIFIER: com.chiu.kamome.dev
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  KamomeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/AppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kamome

schemes:
  Kamome:
    build:
      targets:
        Kamome: all
    test:
      gatherCoverageData: false
      targets:
        - KamomeTests
        - package: KamomeCore/KamomeCoreTests
