# Kamome.xcodeproj is generated from this file via `xcodegen generate`.
# NEVER hand-edit the .xcodeproj (spec §11.1); it is gitignored.
name: Kamome
options:
  # xcodegen 2.45 emits the Xcode 16 project format (objectVersion 77), which
  # the dev Mac's Xcode 15.4 cannot read. Downgrade to format 56 on every
  # generate: we use no 77-only features, and newer Xcode reads 56 fine.
  postGenCommand: sed -i '' 's/objectVersion = 77;/objectVersion = 56;/' Kamome.xcodeproj/project.pbxproj
  xcodeVersion: "15.4"
  developmentLanguage: zh-Hant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  bundleIdPrefix: com.chiu

packages:
  KamomeCore:
    path: .

targets:
  Kamome:
    type: application
    platform: iOS
    sources:
      - App
      - path: Config/TrackingConfig.json
        buildPhase: resources
    dependencies:
      - package: KamomeCore
        product: KamomePersistence
      - package: KamomeCore
        product: KamomeConfig
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Kamome
        CFBundleDevelopmentRegion: zh-Hant
        UILaunchScreen: {}
    settings:
      base:
        # Placeholder until the trademark check clears (spec §11.1).
        PRODUCT_BUNDLE_IDENTIFIER: com.chiu.kamome.dev
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"

  KamomeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/AppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kamome

schemes:
  Kamome:
    build:
      targets:
        Kamome: all
    test:
      gatherCoverageData: false
      targets:
        - KamomeTests
        - package: KamomeCore/KamomeCoreTests
