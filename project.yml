# Kamome.xcodeproj is generated from this file via `xcodegen generate`.
# NEVER hand-edit the .xcodeproj (spec §11.1); it is gitignored.
name: Kamome
options:
  developmentLanguage: zh-Hant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  bundleIdPrefix: com.chiu

packages:
  KamomeCore:
    path: .

targets:
  Kamome:
    type: application
    platform: iOS
    sources:
      - App
      - UI
      - path: Config/TrackingConfig.json
        buildPhase: resources
    dependencies:
      - package: KamomeCore
        product: KamomePersistence
      - package: KamomeCore
        product: KamomeConfig
      - package: KamomeCore
        product: KamomeTrackingEngine
      - package: KamomeCore
        product: KamomeTripComposer
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Kamome
        CFBundleDevelopmentRegion: zh-Hant
        UILaunchScreen: {}
        # Purpose strings are localized in App/Resources/InfoPlist.xcstrings;
        # tracking only ever runs during an explicit trip (§6).
        NSLocationWhenInUseUsageDescription: Kamome records your route only during an active trip you started.
        NSLocationAlwaysAndWhenInUseUsageDescription: Always access lets Kamome keep recording an active trip in the background. Tracking stops the moment you end the trip.
        NSMotionUsageDescription: Motion data tells driving from walking so Kamome can save battery while recording.
        NSPhotoLibraryUsageDescription: Kamome reads photos taken during your trips to place them on your route. Selected-photos access works too. Photos are never copied or uploaded.
        UIBackgroundModes: [location]
    settings:
      base:
        # Placeholder until the trademark check clears (spec §11.1).
        PRODUCT_BUNDLE_IDENTIFIER: com.chiu.kamome.dev
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  KamomeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/AppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kamome

schemes:
  Kamome:
    build:
      targets:
        Kamome: all
    test:
      gatherCoverageData: false
      targets:
        - KamomeTests
        - package: KamomeCore/KamomeCoreTests
