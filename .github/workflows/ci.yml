name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen swiftlint

      - name: Generate Xcode project
        run: xcodegen generate

      - name: SwiftLint
        run: swiftlint --strict

      - name: SDK confinement (MapLibre stays in one file)
        # The RecapSnapshotProviding protocol is the renderer boundary
        # (ADR 2026-07-19): MapLibre types must never leak past the provider.
        # Same discipline keeps import MapKit / import Photos each in one file.
        run: |
          offenders=$(grep -rl --include='*.swift' 'import MapLibre' . \
            | grep -v 'App/Services/MapLibreSnapshotProvider.swift' || true)
          if [ -n "$offenders" ]; then
            echo "import MapLibre outside its provider file:" >&2
            echo "$offenders" >&2
            exit 1
          fi
          echo "MapLibre confinement OK"

      - name: Pick an available iPhone simulator
        # Runner images vary in which device sets they ship — never hardcode
        # a model name.
        run: |
          xcrun simctl list devices available
          DEVICE=$(xcrun simctl list devices available \
            | grep -E "^\s+iPhone" | head -1 | sed -E 's/^ *([^(]+[^ (]) *\(.*/\1/')
          if [ -z "$DEVICE" ]; then echo "No iPhone simulator on runner" >&2; exit 1; fi
          echo "Using simulator: $DEVICE"
          echo "SIM_DEVICE=$DEVICE" >> "$GITHUB_ENV"

      - name: Test (app + KamomeCore package via scheme)
        run: |
          set -o pipefail
          xcodebuild -scheme Kamome test \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE" \
            CODE_SIGNING_ALLOWED=NO
