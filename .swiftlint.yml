included:
  - App
  - Core
  - Tests

excluded:
  - Tests/Fixtures
  - .build

line_length:
  warning: 130
  error: 160

identifier_name:
  min_length: 2

# RecapSnapshotProviding.snapshot is a geo request: center lat/lon, span,
# bearing, and pixel width/height — six self-explanatory params, extended
# additively for the follow-cam (ADR 2026-07-19). One over the default.
function_parameter_count:
  warning: 6
  error: 8

# Allow TrackingConfig.Dwell-style nested value types (CodingKeys sit one
# level deeper than the default permits).
nesting:
  type_level: 2

opt_in_rules:
  - empty_count
  - sorted_imports
