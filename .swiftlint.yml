included:
  - App
  - Core
  - Tests

excluded:
  - Tests/Fixtures
  - .build

line_length:
  warning: 130
  error: 160

identifier_name:
  min_length: 2

# Allow TrackingConfig.Dwell-style nested value types (CodingKeys sit one
# level deeper than the default permits).
nesting:
  type_level: 2

opt_in_rules:
  - empty_count
  - sorted_imports
